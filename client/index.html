<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA Android -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA iOS — these are what make it work on iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DriveKhata" />

    <!-- iOS Icons — Safari ignores manifest icons, needs these separately -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />

    <!-- iOS Splash Screens (optional but makes it feel native) -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- Favicon -->
    <link rel="icon" href="/icon.png" type="image/png" />

    <!-- SEO -->
    <title>DriveKhata - Car Rental</title>
    <meta name="description" content="Car rental tracking and management" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
